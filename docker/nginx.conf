
worker_processes  auto;

events {
	worker_connections  2048;
	multi_accept on;
}


http {
	access_log off;

	include	   mime.types;
	default_type  application/octet-stream;

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;

	keepalive_timeout  65;
	keepalive_requests 10000;

	open_file_cache max=1000 inactive=60s;
	open_file_cache_valid 30s;
	open_file_cache_min_uses 2;

	proxy_connect_timeout 10s;
	proxy_read_timeout 30s;
	proxy_send_timeout 10s;
	proxy_buffer_size 16k;
	proxy_buffers 4 32k;

	proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=tmdb_cache:10m max_size=500m inactive=24h;

	server {
		listen	80;
		listen	443 ssl;

		root	/home/www/public;
		server_name	movie-pilot.org www.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

		location / {
			index index.html index.htm;
			try_files $uri $uri/ /index.html;
		}

		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
			expires 7d;
			add_header Cache-Control "public, immutable";
		}

		location /captcha/ {
			proxy_pass	http://app.movie-pilot.org:9899;
		}

		location /cookiecloud/ {
			proxy_pass	http://localhost:8088;
		}

		location /plugin/ {
			proxy_pass	http://localhost:3001;
		}

		location /subscribe/ {
			proxy_pass	http://localhost:3001;
		}

		location /workflow/ {
			proxy_pass	http://localhost:3001;
		}

		location /u115/ {
			proxy_pass	http://localhost:3001;
		}

		location /recognize/ {
			proxy_pass	http://localhost:3001;
		}

		location /status {
			stub_status on;
			access_log   off;
		}

	}

	server {
		listen	80;
		listen	443 ssl;

		root	/home/www/;
		server_name	wechat.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

		location /cgi-bin/gettoken {
			proxy_pass https://qyapi.weixin.qq.com;
		}
		location /cgi-bin/message/send {
			proxy_pass	https://qyapi.weixin.qq.com;
		}
		location /status {
			stub_status on;
			access_log   off;
		}
	}

	server {
		listen	80;
		listen	443 ssl;

		root	/home/www/;
		server_name	tmdb.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

		location / {
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header Host "api.themoviedb.org";
			proxy_set_header X-Protocal https;
			proxy_http_version 1.1;
			proxy_ssl_server_name on;
			proxy_pass https://api.themoviedb.org;

			proxy_cache tmdb_cache;
			proxy_cache_valid 200 12h;
			proxy_cache_use_stale error timeout updating;
			proxy_cache_lock on;
			add_header X-Cache-Status $upstream_cache_status;
		}
		location /status {
			stub_status on;
			access_log   off;
		}
	}

	server {
		listen	80;
		listen	443 ssl;

		root	/home/www/;
		server_name	wiki.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

		location / {
			proxy_pass http://app.movie-pilot.org:3000/;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /status {
            stub_status on;
			access_log   off;
		}
	}

	server {
		listen	80;
		listen	443 ssl;

		root	/home/www/;
		server_name	api.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

		location / {
			proxy_pass http://localhost:8888/docs;
		}

		location /api/ {
            proxy_pass http://localhost:8888/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
		location /status {
            stub_status on;
			access_log   off;
		}
	}

	server {
        listen	80;
		listen	443 ssl;

		root	/home/www/;
		server_name	glitchtip.movie-pilot.org;

		ssl_certificate	/home/www/certs/movie-pilot.org.cer;
		ssl_certificate_key	/home/www/certs/movie-pilot.org.key;

        client_max_body_size 40M;

        location / {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}

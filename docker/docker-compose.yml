version: '3.3'

services:

    postgres:
        image: 'postgres:17'
        container_name: moviepilot-postgres
        environment:
            POSTGRES_DB: moviepilot
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        command:
            - "postgres"
            - "-c"
            - "shared_buffers=2GB"
            - "-c"
            - "effective_cache_size=6GB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=512MB"
            - "-c"
            - "max_connections=60"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "wal_buffers=64MB"
            - "-c"
            - "max_wal_size=2GB"
        volumes:
            - '/root/postgresql:/var/lib/postgresql/data'
        ports:
            - target: 5432
              published: 5432
              protocol: tcp
        restart: always

    redis:
        image: 'redis:7-alpine'
        container_name: moviepilot-redis
        environment:
            - REDIS_PASSWORD=${REDIS_PASSWORD:-moviepilot_redis_password}
        command:
            [
                "redis-server",
                "--requirepass", "${REDIS_PASSWORD:-moviepilot_redis_password}",
                "--appendonly", "yes",
                "--appendfsync", "everysec",
                "--save", "900", "1",
                "--save", "300", "10",
                "--save", "60", "10000",
                "--maxmemory", "2gb",
                "--maxmemory-policy", "allkeys-lru"
            ]
        ports:
            - target: 6379
              published: 6380
              protocol: tcp
        volumes:
            - '/root/redis:/data'
        restart: always

    moviepilot-server:
        image: 'jxxghp/moviepilot-server:latest'
        container_name: moviepilot-server
        environment:
            - DATABASE_TYPE=postgresql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=moviepilot
            - DB_USER=postgres
            - DB_PASSWORD=postgres
            - DB_POOL_SIZE=8
            - DB_MAX_OVERFLOW=2
            - CONFIG_DIR=/config
            - REDIS_HOST=localhost
            - REDIS_PORT=6380
            - REDIS_DB=0
            - REDIS_PASSWORD=${REDIS_PASSWORD:-moviepilot_redis_password}
            - SERVER_WORKERS=4
            - SERVER_BACKLOG=4096
        ports:
            - target: 3001
              published: 3001
              protocol: tcp
        volumes:
            - '/root/moviepilot:/config'
        depends_on:
            - postgres
            - redis
        restart: always

    cookiecloud:
        image: 'easychen/cookiecloud:latest'
        container_name: cookiecloud
        environment:
            - 'API_ROOT=/cookiecloud'
        ports:
            - target: 8088
              published: 8088
              protocol: tcp
        volumes:
            - '/mnt/cookiecloud:/data/api/data'
        restart: always

    ocr:
        image: 'jxxghp/moviepilot-ocr:latest'
        container_name: ocr
        ports:
            - target: 9899
              published: 9899
              protocol: tcp
        restart: always

    wiki:
        image: 'ghcr.io/requarks/wiki:2.5'
        container_name: wiki
        environment:
            DB_TYPE: sqlite
            DB_FILEPATH: /config/wiki.db
        volumes:
            - '/root/wiki:/config'
        ports:
            - target: 3000
              published: 3000
              protocol: tcp
        restart: unless-stopped
